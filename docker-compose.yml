services:
  # ─── PostgreSQL with pgvector extension ───────────────────────────────────
  # ----- future work here also add ollama and pgvertor ----------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: freightflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freightflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freightflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-freightflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freightflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend: Node.js + Express ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freightflow_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-freightflow}:${POSTGRES_PASSWORD:-freightflow_dev}@db:5432/${POSTGRES_DB:-freightflow}
    ports:
      - "3001:3001"
    volumes:
      # mount source for hot-reload in dev
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend: React + Vite ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freightflow_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      # mount source for hot-reload in dev
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
